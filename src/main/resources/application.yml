server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/team_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root    #  改成你的MySQL用户名
    password: 123456  # 修改为你的 MySQL 密码
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
